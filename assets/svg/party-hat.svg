<svg viewBox="-12 -12 124 132" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <pattern id="stripes" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(60)">
            <rect width="6" height="12" fill="#ff69b4"/>
        </pattern>
    </defs>
    <!-- Hat body: gold with pink stripes -->
    <polygon points="50,0 10,90 90,90" fill="#FFD700"/>
    <polygon points="50,0 10,90 90,90" fill="url(#stripes)" opacity="0.5"/>
    <!-- Pink trim -->
    <rect x="5" y="82" width="90" height="18" rx="9" fill="#ff69b4"/>
    <!-- Pompom -->
    <circle cx="50" cy="6" r="10" fill="#ff69b4"/>
    <!-- Decorative dots -->
    <circle cx="30" cy="45" r="4" fill="#fff" opacity="0.7"/>
    <circle cx="60" cy="35" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="45" cy="65" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="65" cy="60" r="4" fill="#fff" opacity="0.7"/>
</svg>
